<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131318"/><stop offset="0.5" stop-color="#0d0d0f"/><stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#0A84FF" stop-opacity="0.22"/><stop offset="0.55" stop-color="#30D158" stop-opacity="0.06"/><stop offset="1" stop-color="#0d0d0f" stop-opacity="0"/>
    </radialGradient>
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>
  <rect width="1200" height="1200" filter="url(#n)" opacity="0.5"/>
  <g fill="none" stroke="#0A84FF" stroke-opacity="0.16" stroke-width="1">
    <circle cx="600" cy="504" r="264"/><circle cx="600" cy="504" r="384"/>
  </g>
  <rect x="530" y="744" width="140" height="1" fill="#30D158" fill-opacity="0.4"/>
  <text x="600" y="600" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="66" font-weight="600" fill="#F5F5F7" fill-opacity="0.92">收入增长</text>
  <text x="600" y="696" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="33" fill="#F5F5F7" fill-opacity="0.5">收益曲线上扬 · 光粒上升</text>
  <text x="600" y="840" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" fill="#0A84FF" fill-opacity="0.7">assets/money-3.jpg</text>
  <text x="600" y="900" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="22" fill="#F5F5F7" fill-opacity="0.3">占位图 · 待替换（见 图片生成清单.md）</text>
