<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131318"/>
      <stop offset="0.5" stop-color="#0d0d0f"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#0A84FF" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#30D158" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0d0d0f" stop-opacity="0"/>
    </radialGradient>
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" filter="url(#n)" opacity="0.5"/>
  <g fill="none" stroke="#0A84FF" stroke-opacity="0.16" stroke-width="1">
    <circle cx="960" cy="454" r="238"/>
    <circle cx="960" cy="454" r="346"/>
  </g>
  <rect x="890" y="670" width="140" height="1" fill="#30D158" fill-opacity="0.4"/>
  <text x="960" y="540" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="59" font-weight="600" fill="#F5F5F7" fill-opacity="0.92">自研工具</text>
  <text x="960" y="626" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="30" fill="#F5F5F7" fill-opacity="0.5">多模型统一面板 · 一键切换</text>
  <text x="960" y="756" text-anchor="middle" font-family="ui-monospace,monospace" font-size="23" fill="#0A84FF" fill-opacity="0.7">assets/tool.jpg</text>
  <text x="960" y="810" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="20" fill="#F5F5F7" fill-opacity="0.3">占位图 · 待替换为生成图（见 图片生成清单.md）</text>
